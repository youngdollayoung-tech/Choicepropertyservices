<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Page Not Found — Choice Properties</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
  <link rel="stylesheet" href="/css/main.css?v=3">
  <link rel="stylesheet" href="/css/mobile.css?v=4">
  <style>
    .info-hero { background: var(--color-ink); padding: var(--space-16) 0 var(--space-12); margin-bottom: var(--space-12); position: relative; overflow: hidden; }
    .info-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 70% 50%, rgba(212,160,23,0.10) 0%, transparent 60%); }
    .info-hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(to right, transparent 5%, rgba(212,160,23,0.3) 30%, rgba(212,160,23,0.3) 70%, transparent 95%); }
    .info-hero-inner { position:relative; z-index:1; max-width:720px; }
    .info-hero-title { font-family:var(--font-base); font-size:clamp(32px,5vw,52px); font-weight:700; color:var(--color-surface-raised); line-height:1.1; margin-bottom:var(--space-3); letter-spacing:-0.02em; }
    .info-hero-sub { font-size:17px; color:rgba(255,255,255,0.52); line-height:1.65; }
    .info-page { padding: var(--space-16) 0 var(--space-24); }
    .info-content { max-width: 760px; }
    .info-section { margin-bottom: var(--space-10); }
    .info-section h2 { font-family:var(--font-base); font-size:26px; font-weight:700; color:var(--color-ink); margin-bottom:var(--space-4); padding-bottom:var(--space-3); border-bottom:1.5px solid var(--color-surface-subtle); letter-spacing:-0.01em; }
    .info-section p { font-size:15.5px; color:var(--slate-mid); line-height:1.8; margin-bottom:var(--space-4); }
    .info-section ul { padding-left:var(--space-5); display:flex; flex-direction:column; gap:var(--space-2); }
    .info-section ul li { font-size:15.5px; color:var(--slate-mid); line-height:1.7; }
    .info-section a { color:var(--color-brand-light); }
  </style>
  <style>
    .not-found-wrap { min-height: calc(100vh - var(--nav-h) - 300px); display:flex; align-items:center; justify-content:center; padding:var(--space-16) var(--space-6); text-align:center; }
    .not-found-num { font-family:var(--font-base); font-size:clamp(80px,15vw,160px); font-weight:900; color:var(--color-surface-subtle); line-height:1; letter-spacing:-0.04em; margin-bottom:var(--space-4); }
    .not-found-title { font-family:var(--font-base); font-size:clamp(24px,4vw,36px); font-weight:700; color:var(--color-ink); margin-bottom:var(--space-3); }
    .not-found-sub { font-size:16px; color:var(--slate-mid); margin-bottom:var(--space-8); max-width:400px; }
    .not-found-links { display:flex; gap:var(--space-3); justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
<div id="site-nav"></div>
<div class="not-found-wrap">
  <div>
    <div class="not-found-num">404</div>
    <h1 class="not-found-title">Page Not Found</h1>
    <p class="not-found-sub">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="not-found-links">
      <a href="/index.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Browse Listings</a>
      <a href="/faq.html" class="btn btn-ghost btn-lg">Help & FAQ</a>
    </div>
    <p style="margin-top:var(--s-8);font-size:13px;color:var(--slate-light)">
      Need help? <a href="mailto:support@choiceproperties.com" style="color:var(--gold);font-weight:600" data-cfg-email>support@choiceproperties.com</a>
    </p>
  </div>
</div>
<div id="site-footer"></div>
<script src="/config.js"></script>
<script type="module" src="/js/cp-api.js"></script>
<script src="/js/components.js"></script>
</body>
</html>
