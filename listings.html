<script type="module">
const esc = window.CP_esc || (s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'));

// ── State ────────────────────────────────────────────────────────────────
let activeType     = 'all';
let activeBeds     = '';
let activeMaxRent  = '';
let activeMinRent  = '';
let activeSearch   = '';
let activeMinBaths = '';
let sortBy         = 'newest';
let currentPage    = 1;
let totalPages     = 1;
let totalCount     = 0;
let currentView    = 'list';
let isLoading      = false;
let mapInstance    = null;
let mapMarkers     = [];
const savedIds     = new Set(JSON.parse(localStorage.getItem('cp_saved') || '[]'));
const PER_PAGE     = 24;

// ── Read URL → state ──────────────────────────────────────────────────────
function readURL() {
  const p = new URLSearchParams(window.location.search);
  activeSearch   = p.get('q')        || '';
  activeBeds     = p.get('beds')     || '';
  activeMaxRent  = p.get('maxrent')  || '';
  activeMinRent  = p.get('minrent')  || '';
  activeMinBaths = p.get('minbaths') || '';
  activeType     = p.get('type')     || 'all';
  sortBy         = p.get('sort')     || 'newest';
  currentPage    = parseInt(p.get('page') || '1', 10);
}

// ── Write state → URL ─────────────────────────────────────────────────────
function pushURL(replace = false) {
  const p = new URLSearchParams();
  if (activeSearch)   p.set('q',        activeSearch);
  if (activeBeds)     p.set('beds',     activeBeds);
  if (activeMaxRent)  p.set('maxrent',  activeMaxRent);
  if (activeMinRent)  p.set('minrent',  activeMinRent);
  if (activeMinBaths) p.set('minbaths', activeMinBaths);
  if (activeType && activeType !== 'all') p.set('type', activeType);
  if (sortBy && sortBy !== 'newest') p.set('sort', sortBy);
  if (currentPage > 1) p.set('page', currentPage);
  const url = p.toString() ? `?${p}` : window.location.pathname;
  if (replace) history.replaceState(null, '', url);
  else         history.pushState(null, '', url);
}

// ── Sync UI controls to current state ────────────────────────────────────
function syncControls() {
  const si = document.getElementById('searchInput');
  const bf = document.getElementById('bedroomsFilter');
  const mf = document.getElementById('maxRentFilter');
  const ss = document.getElementById('sortSelect');
  if (si) si.value = activeSearch;
  if (bf) bf.value = activeBeds;
  if (mf) mf.value = activeMaxRent;
  if (ss) ss.value = sortBy;
  document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
    pill.classList.toggle('active', pill.dataset.filter === activeType);
  });
  const at    = document.getElementById('advTypeFilter');
  const ab    = document.getElementById('advMinBeds');
  const abath = document.getElementById('advMinBaths');
  const amin  = document.getElementById('advMinRent');
  const amax  = document.getElementById('advMaxRent');
  if (at)    at.value    = ['apartment','house','condo','townhouse'].includes(activeType) ? activeType : '';
  if (ab)    ab.value    = activeBeds;
  if (abath) abath.value = activeMinBaths;
  if (amin)  amin.value  = activeMinRent;
  if (amax)  amax.value  = activeMaxRent;
  updateFilterBadge();
}

// ── Boot ─────────────────────────────────────────────────────────────────
(async () => {
  setupScrollTop();
  readURL();
  syncControls();
  setupFilters();
  await fetchAndRender();
  window.addEventListener('popstate', async () => {
    readURL();
    syncControls();
    await fetchAndRender();
  });
})();

// ── Core fetch ────────────────────────────────────────────────────────────
async function fetchAndRender() {
  if (isLoading) return;
  isLoading = true;
  showSkeletons();

  const result = await CP.Properties.getListings({
    q:         activeSearch,
    type:      activeType,
    beds:      activeBeds,
    min_baths: activeMinBaths,
    min_rent:  activeMinRent,
    max_rent:  activeMaxRent,
    sort:      sortBy,
    page:      currentPage,
    per_page:  PER_PAGE,
  });

  isLoading = false;

  if (!result.ok) {
    console.error('Failed to load listings:', result.error);
    renderError();
    return;
  }

  const { rows, total, total_pages } = result.data;
  totalCount = total;
  totalPages = total_pages;

  const counter = document.getElementById('statListings');
  if (counter) counter.textContent = total.toLocaleString();

  renderProperties(rows);
  renderPagination();
  if (currentView === 'map') initMap(rows);
}

// ── Trigger search (resets to page 1) ─────────────────────────────────────
async function refreshResults() {
  currentPage = 1;
  pushURL();
  await fetchAndRender();
}

// ── Skeletons ─────────────────────────────────────────────────────────────
function showSkeletons() {
  const grid = document.getElementById('propertyGrid');
  const sk = (w1, w2, w3) => `
    <div class="property-card property-card-skeleton">
      <div class="property-card-img skeleton-img skeleton"></div>
      <div class="property-card-body" style="gap:10px;padding:20px">
        <div class="skeleton skeleton-line" style="height:26px;width:${w1}%"></div>
        <div class="skeleton skeleton-line" style="width:${w2}%"></div>
        <div class="skeleton skeleton-line" style="width:${w3}%"></div>
        <div class="skeleton skeleton-line" style="height:12px;width:40%;margin-top:8px"></div>
      </div>
    </div>`;
  grid.innerHTML = [sk(35,80,55),sk(38,75,60),sk(32,85,50),sk(40,78,58),sk(36,82,52),sk(34,76,62)].join('');
  const pg = document.getElementById('paginationBar');
  if (pg) pg.innerHTML = '';
}

// ── updateNav ─────────────────────────────────────────────────────────────
async function updateNav() {
  const session    = await CP.Auth.getSession();
  const authLink   = document.getElementById('navAuthLink');
  const drawerLink = document.getElementById('drawerAuthLink');
  const drawerListLink = document.getElementById('drawerListPropertyLink');
  const dest  = session ? '/landlord/dashboard.html' : '/landlord/login.html';
  const label = session ? 'My Dashboard' : 'Landlord Login';
  if (authLink)   { authLink.href = dest;   authLink.textContent = label; }
  if (drawerLink) { drawerLink.href = dest; drawerLink.textContent = label; }
  if (session && drawerListLink) drawerListLink.href = '/landlord/new-listing.html';
  if (window.CONFIG) {
    const footerEmail = document.getElementById('drawerFooterEmail');
    if (footerEmail) { footerEmail.href = `mailto:${CONFIG.COMPANY_EMAIL}`; footerEmail.textContent = CONFIG.COMPANY_EMAIL; }
    document.querySelectorAll('[data-cfg-email]').forEach(el => { el.href = `mailto:${CONFIG.COMPANY_EMAIL}`; el.textContent = CONFIG.COMPANY_EMAIL; });
    document.querySelectorAll('[data-cfg-phone]').forEach(el => { el.href = `tel:${CONFIG.COMPANY_PHONE.replace(/\D/g,'')}`; el.textContent = CONFIG.COMPANY_PHONE; });
  }
}

// ── renderProperties ──────────────────────────────────────────────────────
function renderProperties(props) {
  const grid      = document.getElementById('propertyGrid');
  const heading   = document.getElementById('listingsHeading');
  const subheading = document.getElementById('listingsSubheading');
  const hasFilters = activeType !== 'all' || activeSearch || activeBeds || activeMaxRent || activeMinRent || activeMinBaths;
  const start = (currentPage - 1) * PER_PAGE + 1;
  const end   = Math.min(currentPage * PER_PAGE, totalCount);

  if (heading) heading.textContent = hasFilters
    ? `${totalCount.toLocaleString()} Result${totalCount !== 1 ? 's' : ''}`
    : 'All Listings';
  if (subheading) subheading.textContent = totalCount > 0
    ? (totalPages > 1
        ? `Showing ${start.toLocaleString()}–${end.toLocaleString()} of ${totalCount.toLocaleString()}`
        : (hasFilters ? 'Matching your filters' : 'Sorted by newest first'))
    : '';

  if (!props.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:var(--s-16) var(--s-6)">
        <div class="empty-state-icon"><i class="fas fa-search" style="font-size:40px;color:var(--color-text-muted)"></i></div>
        <h3 style="margin:var(--s-4) 0 var(--s-2)">No listings match your filters</h3>
        <p style="color:var(--color-text-secondary)">Try adjusting your search or <button onclick="window.clearAllFilters()" style="background:none;border:none;color:var(--color-brand);cursor:pointer;font-size:inherit;padding:0;text-decoration:underline">clearing all filters</button></p>
      </div>`;
    return;
  }

  grid.innerHTML = props.map(p => buildCard(p)).join('');

  grid.querySelectorAll('.property-card-save').forEach(btn => {
    const id = btn.dataset.id;
    if (savedIds.has(id)) { btn.classList.add('saved'); btn.innerHTML = '<i class="fas fa-heart"></i>'; }
    btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); toggleSave(id, btn); });
  });
  grid.querySelectorAll('.property-card').forEach(card => {
    initCarousel(card);
    card.addEventListener('click', e => {
      if (e.target.closest('a, button')) return;
      window.location.href = `/property.html?id=${card.dataset.id}`;
    });
  });
  animateCards();
}

// ── Pagination ────────────────────────────────────────────────────────────
function renderPagination() {
  const bar = document.getElementById('paginationBar');
  if (!bar) return;
  if (totalPages <= 1) { bar.innerHTML = ''; return; }

  const show   = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1].filter(n => n >= 1 && n <= totalPages));
  const sorted = [...show].sort((a, b) => a - b);

  let html = `<div class="pagination">`;
  html += `<button class="pg-btn pg-prev" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}" aria-label="Previous page"><i class="fas fa-chevron-left"></i></button>`;
  let prev = 0;
  for (const n of sorted) {
    if (prev && n - prev > 1) html += `<span class="pg-ellipsis">…</span>`;
    html += `<button class="pg-btn${n === currentPage ? ' pg-active' : ''}" data-page="${n}">${n}</button>`;
    prev = n;
  }
  html += `<button class="pg-btn pg-next" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}" aria-label="Next page"><i class="fas fa-chevron-right"></i></button>`;
  html += `</div>`;
  bar.innerHTML = html;

  bar.querySelectorAll('.pg-btn[data-page]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.disabled) return;
      currentPage = parseInt(btn.dataset.page);
      pushURL();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      await fetchAndRender();
    });
  });
}

/* ─── Build card ─── */
function buildCard(p) {
  const photos   = p.photo_urls?.length ? p.photo_urls : ['/assets/placeholder-property.jpg'];
  const avail    = p.available_date ? formatAvail(p.available_date) : 'Available Now';
  const availNow = !p.available_date || new Date(p.available_date) <= new Date();
  const applyURL = buildApplyURL(p);
  const imgSizes = '(max-width: 539px) calc(100vw - 32px), (max-width: 899px) calc(50vw - 28px), (max-width: 1319px) calc(33vw - 32px), calc(25vw - 32px)';

  const slidesHtml = photos.map((url, i) => {
    const lqip = CP.UI.lqipUrl(url);
    const lqipStyle = lqip ? ` style="background-image:url('${lqip}');background-size:cover;background-position:center"` : '';
    return `<div class="property-card-slide"${lqipStyle}><img src="${CONFIG.img(url,'card')}" alt="${p.title} photo ${i+1}" sizes="${imgSizes}" loading="${i===0?'eager':'lazy'}" ${i===0?'fetchpriority="high"':''} decoding="async" onload="this.classList.add('cp-img-loaded')" onerror="this.classList.add('cp-img-loaded');this.src='/assets/placeholder-property.jpg'"></div>`;
  }).join('');

  const tags = [];
  if (p.pets_allowed) tags.push(`<span class="property-card-tag tag-pet"><i class="fas fa-paw"></i> Pets OK</span>`);
  if (p.parking) tags.push(`<span class="property-card-tag tag-parking"><i class="fas fa-car"></i> Parking</span>`);
  if (Array.isArray(p.utilities_included) ? p.utilities_included.length > 0 : !!p.utilities_included) tags.push(`<span class="property-card-tag tag-utilities"><i class="fas fa-bolt"></i> Utilities</span>`);

  const addrLine = [p.address, p.city, p.state].filter(Boolean).join(', ');

  const specParts = [];
  if (p.bedrooms != null) specParts.push(`<span class="property-card-spec-item"><i class="fas fa-bed"></i>${p.bedrooms === 0 ? 'Studio' : p.bedrooms + ' Bed'}</span>`);
  if (p.bathrooms)        specParts.push(`<span class="property-card-spec-item"><i class="fas fa-bath"></i>${p.bathrooms} Bath</span>`);
  if (p.square_footage)   specParts.push(`<span class="property-card-spec-item">${p.square_footage.toLocaleString()} sqft</span>`);
  const specsHtml = specParts.map((s, i) => i === 0 ? s : `<span class="property-card-spec-sep">·</span>${s}`).join('');

  const ageDays = p.created_at ? Math.floor((Date.now() - new Date(p.created_at).getTime()) / 86400000) : 999;
  let badge = '';
  if (p.featured) {
    badge = `<div class="property-card-badge badge-featured"><i class="fas fa-star"></i> Featured</div>`;
  } else if (ageDays <= 3) {
    badge = `<div class="property-card-badge badge-hot"><i class="fas fa-fire"></i> Hot Deal</div>`;
  } else if (ageDays <= 7) {
    badge = `<div class="property-card-badge badge-new"><i class="fas fa-tag"></i> New Listing</div>`;
  } else if (p.landlords?.verified) {
    badge = `<div class="property-card-badge badge-verified"><i class="fas fa-shield-halved"></i> Verified</div>`;
  } else if (availNow || !p.available_date) {
    badge = `<div class="property-card-badge badge-available"><i class="fas fa-circle-check"></i> Available Now</div>`;
  } else {
    const availLabel = new Date(p.available_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    badge = `<div class="property-card-badge badge-available"><i class="fas fa-calendar"></i> Avail. ${availLabel}</div>`;
  }
  const photoCountHtml = photos.length > 1 ? `<div class="property-card-photo-count"><i class="fas fa-camera"></i> ${photos.length}</div>` : '';

  return `
    <article class="property-card" data-id="${p.id}">
      <a href="/property.html?id=${p.id}" style="display:block;text-decoration:none" tabindex="-1" aria-hidden="true">
        <div class="property-card-img">
          <div class="property-card-slides">${slidesHtml}</div>
          ${photos.length > 1 ? `
            <button class="property-card-nav prev" data-dir="-1" aria-label="Previous photo"><i class="fas fa-chevron-left"></i></button>
            <button class="property-card-nav next" data-dir="1"  aria-label="Next photo"><i class="fas fa-chevron-right"></i></button>
          ` : ''}
          ${badge}
          ${photoCountHtml}
        </div>
      </a>
      <button class="property-card-save" data-id="${p.id}" aria-label="Save property"><i class="far fa-heart"></i></button>
      <div class="property-card-body">
        <div class="property-card-price">$${p.monthly_rent.toLocaleString()}<span class="property-card-price-unit">/mo</span></div>
        ${specsHtml ? `<div class="property-card-specs">${specsHtml}</div>` : ''}
        <a href="/property.html?id=${p.id}" style="text-decoration:none">
          <div class="property-card-title">${p.title}</div>
        </a>
        <div class="property-card-addr"><i class="fas fa-location-dot"></i>${addrLine}</div>
        ${tags.length ? `<div class="property-card-tags">${tags.join('')}</div>` : ''}
      </div>
      <div class="property-card-footer">
        <a href="/property.html?id=${p.id}" class="property-card-view">View Details</a>
        <a href="${applyURL}" class="property-card-cta" onclick="window.trackApply && window.trackApply('${esc(p.id)}')">Apply Now <i class="fas fa-arrow-right"></i></a>
      </div>
    </article>`;
}

/* ─── Animate Cards ─── */
function animateCards() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.property-card:not(.property-card-skeleton)').forEach(c => c.classList.add('cp-card-visible'));
    return;
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('cp-card-visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.06 });
  let i = 0;
  document.querySelectorAll('.property-card:not(.property-card-skeleton)').forEach(card => {
    card.style.setProperty('--cp-delay', Math.min(i * 55, 320) + 'ms');
    observer.observe(card);
    i++;
  });
}

/* ─── Carousel ─── */
function initCarousel(card) {
  const slides  = card.querySelector('.property-card-slides');
  const navBtns = card.querySelectorAll('.property-card-nav');
  if (!slides || !navBtns.length) return;
  let idx = 0;
  const total = card.querySelectorAll('.property-card-slide').length;
  function goTo(n) {
    idx = (n + total) % total;
    slides.style.transform = `translateX(-${idx * 100}%)`;
  }
  navBtns.forEach(btn => {
    btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); goTo(idx + parseInt(btn.dataset.dir)); });
  });
  let touchX = 0;
  slides.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  slides.addEventListener('touchend', e => {
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(idx + (diff > 0 ? 1 : -1));
  }, { passive: true });
}

/* ─── Map ─── */
function initMap(props) {
  if (!mapInstance) {
    mapInstance = L.map('listingsMap', { zoomControl: false }).setView([39.5, -98.35], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>', maxZoom: 18
    }).addTo(mapInstance);
    L.control.zoom({ position: 'bottomright' }).addTo(mapInstance);
  }
  mapMarkers.forEach(m => m.remove()); mapMarkers = [];
  const bounds = [];
  props.forEach(p => {
    if (!p.lat || !p.lng) return;
    const lat = parseFloat(p.lat), lng = parseFloat(p.lng);
    if (isNaN(lat) || isNaN(lng)) return;
    bounds.push([lat, lng]);
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-marker-price">$${(p.monthly_rent/1000).toFixed(p.monthly_rent >= 1000 ? 1 : 0)}${p.monthly_rent >= 1000 ? 'k' : ''}</div>`,
      iconAnchor: [30, 16], iconSize: [60, 32],
    });
    const marker = L.marker([lat, lng], { icon }).addTo(mapInstance);
    marker.bindPopup(`
      <a href="/property.html?id=${p.id}" class="map-popup-card">
        <img class="map-popup-img" src="${CONFIG.img(p.photo_urls?.[0] || '','card')}" alt="${p.title}" onerror="this.src='/assets/placeholder-property.jpg'">
        <div class="map-popup-body">
          <div class="map-popup-price">$${p.monthly_rent.toLocaleString()}<span>/mo</span></div>
          <div class="map-popup-title">${p.title}</div>
          <div class="map-popup-meta">
            ${p.bedrooms != null ? `<span>${p.bedrooms === 0 ? 'Studio' : p.bedrooms + ' bd'}</span>` : ''}
            ${p.bathrooms ? `<span>${p.bathrooms} ba</span>` : ''}
          </div>
          <a href="/property.html?id=${p.id}" class="map-popup-apply">View Property →</a>
        </div>
      </a>`, { maxWidth: 260 });
    mapMarkers.push(marker);
  });
  if (bounds.length) mapInstance.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  setTimeout(() => mapInstance.invalidateSize(), 50);
}

/* ─── View toggle ─── */
document.getElementById('btnListView').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('listPanel').style.display = '';
  document.getElementById('mapPanel').style.display = 'none';
  document.getElementById('btnListView').classList.add('active');
  document.getElementById('btnMapView').classList.remove('active');
});
document.getElementById('btnMapView').addEventListener('click', async () => {
  currentView = 'map';
  document.getElementById('listPanel').style.display = 'none';
  document.getElementById('mapPanel').style.display = 'block';
  document.getElementById('btnMapView').classList.add('active');
  document.getElementById('btnListView').classList.remove('active');
  // Fetch current page's rows for the map (already in DOM state)
  const result = await CP.Properties.getListings({
    q: activeSearch, type: activeType, beds: activeBeds,
    min_baths: activeMinBaths, min_rent: activeMinRent, max_rent: activeMaxRent,
    sort: sortBy, page: currentPage, per_page: PER_PAGE,
  });
  if (result.ok) initMap(result.data.rows);
});

/* ─── Filters ─── */
function setupFilters() {
  document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
    pill.addEventListener('click', () => {
      activeType = pill.dataset.filter;
      refreshResults();
    });
  });

  document.getElementById('searchBtn').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  document.getElementById('bedroomsFilter').addEventListener('change', e => { activeBeds = e.target.value; refreshResults(); });
  document.getElementById('maxRentFilter').addEventListener('change', e => { activeMaxRent = e.target.value; refreshResults(); });
  document.getElementById('sortSelect').addEventListener('change', e => { sortBy = e.target.value; refreshResults(); });

  document.getElementById('moreFiltersBtn').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('moreFiltersDropdown').classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('moreFiltersWrap').contains(e.target))
      document.getElementById('moreFiltersDropdown').classList.remove('open');
  });

  document.getElementById('applyAdvFilters').addEventListener('click', () => {
    activeMinRent  = document.getElementById('advMinRent').value;
    activeMaxRent  = document.getElementById('advMaxRent').value || activeMaxRent;
    activeMinBaths = document.getElementById('advMinBaths').value;
    const advType = document.getElementById('advTypeFilter').value;
    const advBeds = document.getElementById('advMinBeds').value;
    if (advType) activeType = advType;
    if (advBeds !== '') activeBeds = advBeds;
    document.getElementById('moreFiltersDropdown').classList.remove('open');
    refreshResults();
    showToast('Filters applied', 'success');
  });

  document.getElementById('clearAdvFilters').addEventListener('click', () => {
    ['advTypeFilter','advMinBeds','advMinBaths','advMinRent','advMaxRent'].forEach(id => {
      document.getElementById(id).value = '';
    });
    window.clearAllFilters();
    document.getElementById('moreFiltersDropdown').classList.remove('open');
  });
}

window.clearAllFilters = function() {
  activeType = 'all'; activeSearch = ''; activeBeds = '';
  activeMaxRent = ''; activeMinRent = ''; activeMinBaths = '';
  sortBy = 'newest'; currentPage = 1;
  syncControls();
  pushURL(true);
  fetchAndRender();
};

function doSearch() {
  activeSearch = document.getElementById('searchInput').value.trim();
  refreshResults();
}

function updateFilterBadge() {
  const badge = document.getElementById('filterActiveBadge');
  if (!badge) return;
  const count = [activeType && activeType !== 'all', !!activeBeds, !!activeMaxRent, !!activeMinRent, !!activeMinBaths, !!activeSearch].filter(Boolean).length;
  if (count > 0) { badge.textContent = count; badge.style.display = 'inline-flex'; }
  else badge.style.display = 'none';
}
